    params:
      returns: dict
  get_external_url_image:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.tools.tools
    args: [gs_uri]
    params:
      returns: str
  get_latest_bus_stop_images:
    type: async
    module: labs.agents.adk_and_bigquery.tools
