functions:
  _convert_proto:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.tools.tools
    args: [v]
  add_tables:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.agent
    args: [table_names, bq_dataset_id, billing_project]
    params:
      returns: None
  after_tool:
    type: sync
    module: agents.maintenance-scheduler.maintenance_scheduler.shared_libraries.callbacks
    args: [tool, args, tool_context, tool_response]
    params:
      returns: Optional[Dict]
  ask_lakehouse:
    type: async
    module: agents.maintenance-scheduler.maintenance_explorer.tools.tools
    args: [question, tool_context]
    params:
      returns: str
  create_ca_agent:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.agent
    args: [parent_agent_name, agent_id, agent_name, billing_project]
    params:
      returns: None
  create_ca_conversation:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.agent
    args: [agent_name, parent_agent_name, conversation_name, conversation_id]
    params:
      returns: None
  get_bigquery_data_project:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.config
    args: [self]
    params:
      returns: str
  get_bigquery_run_project:
    type: sync
    module: agents.maintenance-scheduler.maintenance_explorer.config
    args: [self]
    params:
      returns: str
  get_current_time:
    type: sync
    module: agents.maintenance-scheduler.maintenance_scheduler.tools.tools
    params:
      returns: str
  get_expected_number_of_passengers:
    type: sync
    module: agents.maintenance-scheduler.maintenance_scheduler.tools.tools
