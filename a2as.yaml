agents:
  email_notification_generator:
    type: instance
    models: [configs.email_generator_agent_settings.model]
    params:
      name: configs.email_generator_agent_settings.name
      description: configs.email_generator_agent_settings.description
      instruction: [Generate an email explaining the work that needs to be done to fix the bus stop., 'Include the bus stop
          id, bus stop image, reason for maintenance and the time', when the maintenance needs to occur., 'Return the email
          subject with the following structure:', 'Scheduled maintenance for bus stop #[bus_stop_id] at [scheduled_time]',
        'Return the email body with the following structure:', 'The bus stop #[bus_stop_id] needs to be repaired based on
          the analysis of this image:', '[image]', 'We think that the bus stop or the area around it has these problems: [reason].',
        'The bus stop is located at [street], [city], [state] [zip].', 'If you find that this request is sent in error, please
          contact the maintenance', team at (111)555-2222., 'Sincerely,', Automated Scheduling Assistant]
      input_schema: MaintenanceNotification
      output_schema: Email
      output_key: email
      disallow_transfer_to_parent: "True"
      disallow_transfer_to_peers: "True"
  root_agent.0:
    type: instance
    models: [gemini-2.5-flash]
    tools: [get_latest_bus_stop_images, mcp_toolset]
    mcp: [mcp_toolset]
    params:
      name: bigquery_interaction_demo_agent
      generate_content_config:
        ref: generate_content_config
      description: Bus stop image analysis agent
      instruction: [You can answer questions about bus stop images. You must use only the provided tools to answer the questions.,
        'If you use the ask-data-insights tool, make sure to provide the table_reference parameter exactly as', 'If you use
          the get-table-information tool, make sure to provide the dataset parameter as "multimodal".', 'If you are asked
          to describe your capabilities, reply with some variation on the following message. Use the tone of the question
          to generate the response.', '"I can answer questions about the bus stop images and about BigQuery tables in the
          multimodal dataset. Try asking these questions:', '- Show the bus stop images', '- Find images containing broken
          glass', '- What is the breakdown of bus stop cleanliness levels?', '- What tables are in the multimodal dataset?',
        '- Who has access to the multimodal dataset?', '- What is the schema of the image_reports table?', '"']
      planner: BuiltInPlanner
      instance: root_agent
  root_agent.1:
    type: instance
    models: [configs.root_agent_settings.model]
    tools: [ask_lakehouse, get_image_from_bucket, analytics_chart_tool, get_external_url_image]
    params:
      name: maintenance_explorer
      description: configs.root_agent_settings.description
      global_instruction: [You are a transit supervisor responsible for monitoring bus stops in order to ensure they are safe
          and clean for everyone., 'A bus stop is comprised of any combination of the following physical assets: a bench,
          a sign, a shelter, and/or a trash can.', 'Constraints:', '*   **Never mention "tool_code", "tool_outputs", or "print
          statements" to the user.** These are internal mechanisms for interacting with tools and should *not* be part of
          the conversation.  Focus solely on providing a natural and helpful customer experience.  Do not reveal the underlying
          implementation details.']
      planner: BuiltInPlanner
      instruction: [Generate an email explaining the work that needs to be done to fix the bus stop., 'Include the bus stop
          id, bus stop image, reason for maintenance and the time', when the maintenance needs to occur., 'Return the email
          subject with the following structure:', 'Scheduled maintenance for bus stop #[bus_stop_id] at [scheduled_time]',
        'Return the email body with the following structure:', 'The bus stop #[bus_stop_id] needs to be repaired based on
          the analysis of this image:', '[image]', 'We think that the bus stop or the area around it has these problems: [reason].',
        'The bus stop is located at [street], [city], [state] [zip].', 'If you find that this request is sent in error, please
          contact the maintenance', team at (111)555-2222., 'Sincerely,', Automated Scheduling Assistant]
      before_agent_callback: setup_before_agent_call
      generate_content_config:
        class: GenerateContentConfig
        temperature: "0.01"
      instance: root_agent
  root_agent.2:
    type: instance
    models: [configs.root_agent_settings.model]
    tools: [get_unresolved_incidents_tool, get_expected_number_of_passengers_tool, schedule_maintenance_tool, get_current_time,
      email_content_generator_tool, is_time_on_weekend]
    params:
      name: configs.root_agent_settings.name
      generate_content_config:
        ref: generate_content_config
      description: configs.root_agent_settings.description
      global_instruction: ''
      instruction: [Generate an email explaining the work that needs to be done to fix the bus stop., 'Include the bus stop
          id, bus stop image, reason for maintenance and the time', when the maintenance needs to occur., 'Return the email
          subject with the following structure:', 'Scheduled maintenance for bus stop #[bus_stop_id] at [scheduled_time]',
        'Return the email body with the following structure:', 'The bus stop #[bus_stop_id] needs to be repaired based on
          the analysis of this image:', '[image]', 'We think that the bus stop or the area around it has these problems: [reason].',
        'The bus stop is located at [street], [city], [state] [zip].', 'If you find that this request is sent in error, please
          contact the maintenance', team at (111)555-2222., 'Sincerely,', Automated Scheduling Assistant]
      planner: BuiltInPlanner
      after_tool_callback: after_tool
      before_model_callback: rate_limit_callback
      instance: root_agent

models:
  configs.email_generator_agent_settings.model:
    type: literal
    agents: [email_notification_generator]
  configs.root_agent_settings.model:
    type: literal
    agents: [root_agent.1, root_agent.2]
  gemini-2.5-flash:
    type: function
    agents: [root_agent.0]
    params:
      wrapper: Gemini
      model: gemini-2.5-flash
      retry_options: retry_options

tools:
  analytics_chart_tool:
    type: function
    agents: [root_agent.1]
  ask_lakehouse:
    type: function
    agents: [root_agent.1]
  email_content_generator_tool:
    type: function
    agents: [root_agent.2]
  get_current_time:
    type: function
    agents: [root_agent.2]
    params:
      description: |-
        Returns current time

        Returns:
            Current time in New York, NY, USA

        Example:
            >>> get_current_time()
            'Mon 28 Apr 2025, 12:41PM'
  get_expected_number_of_passengers_tool:
    type: function
    agents: [root_agent.2]
  get_external_url_image:
    type: function
    agents: [root_agent.1]
    params:
      description: |-
        Retrieves the public URL of an image from a Google Cloud Storage bucket.

        Args:
            gs_uri (str): uri to the image in a bucket
        Returns:
            str: The public URL of the image, or an error message if not found or accessible.
  get_image_from_bucket:
    type: function
    agents: [root_agent.1]
  get_latest_bus_stop_images:
    type: function
    agents: [root_agent.0]
  get_unresolved_incidents_tool:
    type: function
    agents: [root_agent.2]
  is_time_on_weekend:
    type: function
    agents: [root_agent.2]
    params:
      description: |-
        Returns:
             a Boolean indicating if the current time is on the weekend
  mcp_toolset:
    type: mcp
    agents: [root_agent.0]
    params:
      class: McpToolset
      mcp_server: mcp_toolset
  schedule_maintenance_tool:
    type: function
    agents: [root_agent.2]

mcp:
  forecast_passangers:
    type: toolbox
    url: configs.mcp_toolbox_uri
    params:
      class: ToolboxSyncClient
      method: load_toolset
      toolset: forecast_passangers
  mcp_toolset:
    type: network
    url: http://127.0.0.1:5000/mcp/bus-stop-images-toolset
    agents: [root_agent, root_agent.0]
    params:
      class: McpToolset
      connection_type: StreamableHTTPConnectionParams
      headers:
        Authorization: Bearer your-auth-token-in-production

