variables:
  BIGQUERY_DATA_PROJECT_ID:
    type: env
    params:
      caller: [os.getenv]
      path: [labs.agents.adk_and_bigquery.tools]
  BIGQUERY_RUN_PROJECT_ID:
    type: env
    params:
      caller: [os.getenv]
      path: [labs.agents.adk_and_bigquery.tools]

files:
  ../.env:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), ../.env]

networks:
  "127.0.0.1":
    type: api
    actions: [GET]
    urls: [/, /mcp/bus-stop-images-toolset]
    protocols: [http]
    ports: ["5000"]
    params:
      links: [default, McpToolset, url]
  storage.cloud.google.com:
    type: api
    actions: [GET]
    urls: ['/{...}']
    protocols: [https]
    ports: ["443"]
    params:
      pattern: https://storage.cloud.google.com/{bucket_name}/{object_name}?authuser=1
      caller: [get_external_url_image]
  storage.mtls.cloud.google.com:
    type: api
    actions: [GET]
    urls: ['/{...}']
    protocols: [https]
    ports: ["443"]
    params:
      caller: [get_unresolved_incidents]
      links: [source_image_uri]
